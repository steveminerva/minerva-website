  /* Teaser home: top-bar wordmark + centred mini logo appear only after the hero
     logo has scrolled away. (.brand-mini is already gated by body.scrolled in base CSS.) */

  body.teaser.scrolled:not(.menu-open) .top-logo { opacity: 1; pointer-events: auto; }

     (not at the earlier nav-solid threshold) on the teaser home. */
  body.teaser.nav-solid .top { background: transparent; border-bottom-color: transparent; }
  body.teaser.scrolled .top { background: #000; border-bottom-color: var(--line); }
