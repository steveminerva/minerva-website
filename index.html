<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minerva Luxury Motors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/minerva.css">
<style id="motto-init">
  :root {
    --motto-font: 'Cormorant Garamond', Georgia, serif;
    --motto-weight: 400;
    --motto-size: clamp(1.5rem, 3.4vw, 2.6rem);
    --motto-style: normal;
    --motto-spacing: 0.06em;
    --motto-color: var(--platinum);
    --motto-transform: none;
    --motto-mt: clamp(18px, 4vh, 52px);
  }
</style>
</head>
<body class="home teaser">

  <!-- TOP BAR -->
  <header class="top">
    <span class="top-spacer" aria-hidden="true"></span>
    <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- MENU DRAWER -->
  <nav class="menu-overlay" id="menu" aria-hidden="true" aria-label="Main menu">
    <div class="menu-ghost" aria-hidden="true">MINERVA</div>
    <div class="menu-inner">
      <div class="menu-main">
        <a class="menu-item" href="about.html"><span class="mi-idx">01</span>About Us</a>
        <a class="menu-item" href="history.html"><span class="mi-idx">02</span>History</a>
        <a class="menu-item" href="aegis.html"><span class="mi-idx">03</span>Aegis</a>
        <a class="menu-item" href="sovereign.html"><span class="mi-idx">04</span>Sovereign</a>
        <a class="menu-item" href="news.html"><span class="mi-idx">05</span>News</a>
      </div>
      <div class="menu-foot">
        <div class="menu-foot-left">
          <a class="menu-login" href="login.html">Login</a>
          <form class="subscribe" id="subscribeForm" autocomplete="off">
            <label class="subscribe-lbl" for="subEmail">Subscribe for the announcement</label>
            <div class="subscribe-row">
              <input id="subEmail" type="email" placeholder="Email address" required>
              <button type="submit" aria-label="Subscribe">Subscribe</button>
            </div>
            <p class="subscribe-done" id="subscribeDone" hidden>Thank you — you're on the list.</p>
          </form>
        </div>
        <div class="menu-lang" id="langRow" role="group" aria-label="Language">
          <button class="lang active" data-lang="en">English</button>
          <button class="lang" data-lang="nl">Nederlands</button>
          <button class="lang" data-lang="fr">Français</button>
          <button class="lang" data-lang="de">Deutsch</button>
          <button class="lang" data-lang="it">Italiano</button>
          <button class="lang" data-lang="es">Español</button>
          <button class="lang cjk" data-lang="zh">中文</button>
          <button class="lang cjk" data-lang="ja">日本語</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="teaser-hero" data-screen-label="Teaser">
    <div class="teaser-bg" aria-hidden="true">
      <img src="uploads/heritage-hero.png" alt="">
      <span class="teaser-scrim"></span>
    </div>

    <div class="teaser-inner">
      <h1 class="hero-logo">
        <image-slot id="minerva-logo" shape="rect" fit="contain" src="uploads/minerva-logo-black.png" placeholder="Drop Minerva logo"></image-slot>
        <span class="sr-only">Minerva</span>
      </h1>

      <p class="teaser-slogan">Sapientia et Ars · 1897</p>

      <p class="teaser-motto">
        <span class="tm-line" data-i18n="home.motto1">Beyond luxury and innovation.</span>
        <span class="tm-line" data-i18n="home.motto2">The marque of kings returns</span>
      </p>
    </div>
  </section>

  <!-- FOOTER -->
  <!-- FOOTER injected by assets/minerva.js (shared across all pages) -->

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#000000"/><circle cx="50" cy="50" r="22" fill="none" stroke="#B8BCC2" stroke-width="1.2"/><text x="50" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#DADDE1" text-anchor="middle" letter-spacing="1">M</text></svg>
  </template>

  <div id="tweaksRoot"></div>

  <script src="assets/image-slot.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/minerva.js"></script>
  <!-- Tweaks panel (design-time only) removed for the production build. -->
</body>
</html>
