<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Minerva Luxury Motors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/minerva.css">
<style>
  .login-error { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--minerva-red-bright); text-align: center; min-height: 14px; margin-top: 2px; }
  .login-ok { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--platinum-bright); text-align: center; min-height: 14px; margin-top: 2px; }
  /* Heritage self-registration */
  [hidden] { display: none !important; }   /* .login-card sets display:flex, which otherwise overrides the hidden attribute */
  .page-title.reg-mode { font-size: clamp(1.3rem, 4.5vw, 2.4rem) !important; line-height: 1.15; max-width: 16ch; margin-left: auto; margin-right: auto; }
  .reg-link { display:block; margin:14px auto 0; background:none; border:0; color:var(--platinum-deep); font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; cursor:pointer; }
  .reg-link:hover { color:var(--platinum-bright); }
  .reg-seg { display:flex; gap:8px; }
  .reg-seg button { flex:1; padding:12px 0; background:#0a0b0d; border:1px solid var(--line); color:var(--fg-dim); font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; cursor:pointer; transition:border-color .25s,color .25s; }
  .reg-seg button.on { border-color:var(--platinum-deep); color:var(--fg); background:#0d0e11; }
  .reg-hint { font-size:11px; color:var(--mute); margin-top:6px; }
  .reg-tier { font-weight:300; font-size:.95rem; color:var(--fg-dim); margin:6px 0 2px; text-align:center; }
  .reg-tier b { color:var(--platinum-bright); font-weight:500; }
  .reg-ok { text-align:center; padding:10px 0; }
  .reg-ok .ro-h { font-size:clamp(1.3rem,3vw,1.9rem); letter-spacing:.03em; margin-bottom:12px; }
  .reg-ok .ro-b { font-weight:300; color:var(--fg-dim); line-height:1.65; max-width:40ch; margin:0 auto 18px; }
  /* show/hide password */
  .pw-wrap { position: relative; display: flex; align-items: center; }
  .pw-wrap input { flex: 1; padding-right: 40px; }
  .pw-eye { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: 0; color: var(--mute); cursor: pointer; padding: 6px; display: flex; }
  .pw-eye:hover { color: var(--fg); }
  .pw-eye svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  .pw-eye .eye-off { display: none; }
  .pw-eye.on .eye-on { display: none; }
  .pw-eye.on .eye-off { display: block; }
</style>
</head>
<body class="inner">

  <header class="top">
    <a class="brand-mini" href="index.html">MINERVA</a>
    <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="menu-overlay" id="menu" aria-hidden="true" aria-label="Main menu">
    <div class="menu-ghost" aria-hidden="true">MINERVA</div>
    <div class="menu-inner">
      <div class="menu-main">
        <a class="menu-item" href="about.html"><span class="mi-idx">01</span>About Us</a>
        <a class="menu-item" href="history.html"><span class="mi-idx">02</span>History</a>
        <a class="menu-item" href="aegis.html"><span class="mi-idx">03</span>Aegis</a>
        <a class="menu-item" href="sovereign.html"><span class="mi-idx">04</span>Sovereign</a>
        <a class="menu-item" href="news.html"><span class="mi-idx">05</span>News</a>
      </div>
      <div class="menu-foot">
        <div class="menu-foot-left">
          <a class="menu-login" href="login.html">Login</a>
          <form class="subscribe" id="subscribeForm" autocomplete="off">
            <label class="subscribe-lbl" for="subEmail">Subscribe for the announcement</label>
            <div class="subscribe-row">
              <input id="subEmail" type="email" placeholder="Email address" required>
              <button type="submit" aria-label="Subscribe">Subscribe</button>
            </div>
            <p class="subscribe-done" id="subscribeDone" hidden>Thank you — you're on the list.</p>
          </form>
        </div>
        <div class="menu-lang" id="langRow" role="group" aria-label="Language">
          <button class="lang active" data-lang="en">English</button>
          <button class="lang" data-lang="nl">Nederlands</button>
          <button class="lang" data-lang="fr">Français</button>
          <button class="lang" data-lang="de">Deutsch</button>
          <button class="lang" data-lang="it">Italiano</button>
          <button class="lang" data-lang="es">Español</button>

  <main class="page" data-screen-label="Login">
    <h1 class="page-title" style="font-size:clamp(2rem,6.5vw,4.8rem);" data-i18n="login.title">LOGIN</h1>
    <form class="login-card" id="loginForm" autocomplete="off" onsubmit="return false;">
      <div class="field">
        <label for="email" data-i18n="login.email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="pw" data-i18n="login.password">Password</label>
        <div class="pw-wrap"><input id="pw" type="password" placeholder="••••••••" autocomplete="current-password"><button type="button" class="pw-eye" data-eye="pw" aria-label="Show password"><svg class="eye-on" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-off" viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M10.6 5.2A11 11 0 0 1 12 5c7 0 11 7 11 7a18.4 18.4 0 0 1-3.2 3.8M6.2 6.3A18.3 18.3 0 0 0 1 12s4 7 11 7a11 11 0 0 0 3.8-.7"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg></button></div>
      </div>
      <p class="login-error" id="loginError" role="alert"></p>
      <button class="btn" type="submit" id="loginBtn" data-i18n="login.enter">Enter</button>
    </form>
    <button class="reg-link" type="button" id="toRegister">New here? Apply for Heritage membership</button>

    <form class="login-card" id="registerCard" autocomplete="off" onsubmit="return false;" hidden>
      <div class="field"><label for="rName">Full name</label><input id="rName" type="text" placeholder="Your name" autocomplete="name"></div>
      <div class="field"><label for="rEmail">Email</label><input id="rEmail" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label for="rPw">Choose a password</label><div class="pw-wrap"><input id="rPw" type="password" placeholder="At least 8 characters" autocomplete="new-password"><button type="button" class="pw-eye" data-eye="rPw" aria-label="Show password"><svg class="eye-on" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-off" viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M10.6 5.2A11 11 0 0 1 12 5c7 0 11 7 11 7a18.4 18.4 0 0 1-3.2 3.8M6.2 6.3A18.3 18.3 0 0 0 1 12s4 7 11 7a11 11 0 0 0 3.8-.7"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg></button></div></div>
      <div class="field"><label>Do you own a Minerva?</label><div class="reg-seg" id="qOwn"><button type="button" data-v="no" class="on">No</button><button type="button" data-v="yes">Yes</button></div></div>
      <div class="field"><label>An outstanding new-vehicle commission?</label><div class="reg-seg" id="qComm"><button type="button" data-v="no" class="on">No</button><button type="button" data-v="yes">Yes</button></div></div>
      <div class="field" id="rVinBlock" hidden><label for="rVin">Vehicle VIN</label><input id="rVin" type="text" placeholder="The VIN of your Minerva"><p class="reg-hint">Minerva will verify this against the register.</p></div>
      <p class="reg-tier" id="rTier">You will join as an <b>Admirer</b>.</p>
      <p class="login-error" id="registerError" role="alert"></p>
      <button class="btn" type="submit" id="registerBtn">Apply for membership</button>
      <button class="reg-link" type="button" id="toLogin">← Back to sign in</button>
    </form>

    <div class="login-card reg-ok" id="registerDone" hidden>
      <p class="ro-h" id="regDoneH"></p>
      <p class="ro-b" id="regDoneB"></p>
      <button class="btn" type="button" id="regDoneBtn">Back to sign in</button>
    </div>
  </main>

  <a class="back-link" href="index.html"><span class="arr">←</span> Back to home</a>

  <script src="assets/i18n.js"></script>
  <script src="assets/heritage-i18n.js"></script>
  <script src="assets/minerva.js"></script>
  <script>
    (function () {
      function param(k) { try { return new URLSearchParams(location.search).get(k); } catch (e) { return null; } }
      function T(key, fb) { try { var v = window.MinervaI18n && window.MinervaI18n.t(key, window.MinervaI18n.lang); return v != null ? v : fb; } catch (e) { return fb; } }
      // Wait for the engine, then for its first Supabase session check to resolve
      // (V.ready), so isAdmin()/currentVip() reflect the real session.
      function ready(fn) {
        if (window.MinervaVIP) { (window.MinervaVIP.ready ? window.MinervaVIP.ready(fn) : fn()); return; }
        var t = setInterval(function () { if (window.MinervaVIP) { clearInterval(t); ready(fn); } }, 40);
      }

      ready(function () {
        var V = window.MinervaVIP;
        var form = document.getElementById('loginForm');
        var emailEl = document.getElementById('email');
        var pwEl = document.getElementById('pw');
        var errEl = document.getElementById('loginError');
        var btn = document.getElementById('loginBtn');

        // The Minerva Sandbox — ring + logo (same overlay as the heritage flow).
        // Shows for 3s after a successful login, then lands on the home page,
        // where the top banner reflects the credentials used (super-admin / VIP).
        function enter() {
          if (btn) btn.disabled = true;
          var ov = document.createElement('div');
          ov.className = 'reg-overlay';
          ov.setAttribute('role', 'dialog');
          ov.setAttribute('aria-label', 'Minerva');
          ov.innerHTML = '<div class="ro-stage"><span class="ro-ring" aria-hidden="true"></span>'
            + '<img class="ro-logo" src="uploads/minerva-logo-black.png" alt="Minerva"></div>';
          document.body.appendChild(ov);
          document.body.classList.add('menu-open');
          ov.classList.add('show');
          requestAnimationFrame(function () { ov.classList.add('show'); });
          setTimeout(function () { location.href = 'index.html'; }, 3000);
        }

        // Magic-link / invite from the email: supabase-js consumes the token in
        // the URL automatically (detectSessionInUrl). loginByInvite() resolves the
        // resulting session and maps the same reasons. Legacy ?invite=<id> links
        // also fall through here (no static session → handled as a normal login).
        function handleInviteThenLogin() {
          var hasAuthToken = /[#&?](access_token|refresh_token|code|token_hash|type)=/.test(location.hash + location.search);
          var legacyInvite = param('invite');
          if (!hasAuthToken && !legacyInvite) { afterInvite(); return; }
          Promise.resolve(V.loginByInvite()).then(function (ir) {
            if (ir && ir.ok) { enter(); return; }
            if (ir && ir.reason === 'expired') { errEl.textContent = T('app.login.errInvExpired', 'This invitation has expired — contact access@minervaluxurymotors.com'); }
            else if (ir && ir.reason === 'cancelled') { errEl.textContent = T('app.login.errInvCancel', 'This access has been withdrawn — contact access@minervaluxurymotors.com'); }
            else if (hasAuthToken) { errEl.textContent = T('app.login.errInvInvalid', 'This invitation link is no longer valid'); }
            afterInvite();
          });
        }

        function afterInvite() {
          // Already signed in? Route by role.
          if (V.isHeritage && V.isHeritage()) { location.href = 'portal.html'; return; }
          if (V.isAdmin() || V.currentVip()) { location.href = 'index.html'; return; }
          form.addEventListener('submit', submit);
          btn.addEventListener('click', submit);
          pwEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
        }

        function submit() {
          errEl.className = 'login-error'; errEl.textContent = '';
          var email = (emailEl.value || '').trim();
          var pw = (pwEl.value || '').trim();
          if (!email || !pw) { errEl.textContent = T('app.login.errEmpty', 'Enter your email and password'); return; }
          if (btn) btn.disabled = true;
          // 1) Super-admin — Supabase Auth + profiles.is_admin.
          Promise.resolve(V.adminLogin(email, pw)).then(function (isAdm) {
            if (isAdm) { enter(); return; }
            // 2) VIP guest — Supabase Auth + has_access check.
            return Promise.resolve(V.authVip(email, pw)).then(function (res) {
              if (res && res.ok) { if (res.heritage) { location.href = 'portal.html'; return; } enter(); return; }
              if (btn) btn.disabled = false;
              if (res && res.reason === 'expired') { errEl.textContent = T('app.login.errExpired', 'Your access has expired — contact access@minervaluxurymotors.com'); return; }
              if (res && res.reason === 'cancelled') { errEl.textContent = T('app.login.errCancelled', 'Your access has been withdrawn — contact access@minervaluxurymotors.com'); return; }
              // 3) Customers — not yet enabled / not recognised.
              errEl.textContent = T('app.login.errInvalid', 'Email or password not recognised — please contact access@minervaluxurymotors.com');
            });
          }).catch(function () {
            if (btn) btn.disabled = false;
            errEl.textContent = T('app.login.errInvalid', 'Email or password not recognised — please contact access@minervaluxurymotors.com');
          });
        }

        handleInviteThenLogin();
      });
    })();
  </script>

  <!-- Heritage self-registration (calls the hardened public heritage-register function directly) -->
  <script>
    (function () {
      function curLang() { try { return (window.MinervaI18n && window.MinervaI18n.lang) || 'en'; } catch (e) { return 'en'; } }
      function H(k, vars) { try { return window.MinervaHeritageL10n ? window.MinervaHeritageL10n.t(k, window.MinervaHeritageL10n.pickLang(), vars) : k; } catch (e) { return k; } }
      function setText(sel, key) { var el = document.querySelector(sel); if (el) el.textContent = H(key); }
      function localizeReg() {
        var c = document.getElementById('registerCard'); if (!c) return;
        setText('#registerCard label[for="rName"]', 'reg.name');
        setText('#registerCard label[for="rEmail"]', 'reg.email');
        setText('#registerCard label[for="rPw"]', 'reg.password');
        setText('#registerCard label[for="rVin"]', 'reg.vin');
        var qo = c.querySelector('#qOwn'); if (qo && qo.closest('.field')) { var ql = qo.closest('.field').querySelector('label'); if (ql) ql.textContent = H('reg.qOwn'); }
        var qc = c.querySelector('#qComm'); if (qc && qc.closest('.field')) { var ql2 = qc.closest('.field').querySelector('label'); if (ql2) ql2.textContent = H('reg.qComm'); }
        [].forEach.call(c.querySelectorAll('.reg-seg button'), function (b) { var v = b.getAttribute('data-v'); b.textContent = H(v === 'yes' ? 'reg.yes' : 'reg.no'); });
        var hint = c.querySelector('.reg-hint'); if (hint) hint.textContent = H('reg.vinHint');
        var rb = document.getElementById('registerBtn'); if (rb) rb.textContent = H('reg.submit');
        var tl = document.getElementById('toLogin'); if (tl) tl.textContent = H('reg.back');
        var tr = document.getElementById('toRegister'); if (tr) tr.textContent = H('reg.cta');
        var dn = document.getElementById('regDoneBtn'); if (dn) dn.textContent = H('reg.back');
      }
      var loginCard = document.getElementById('loginForm');
      var regCard = document.getElementById('registerCard');
      var doneCard = document.getElementById('registerDone');
      if (!regCard) return;
      var own = 'no', comm = 'no';
      var TLABEL = { admirer: 'Admirer', custodian: 'Custodian', commissioner: 'Commissioner' };

      var titleEl = document.querySelector('.page-title');
      function show(which) {
        loginCard.hidden = which !== 'login';
        regCard.hidden = which !== 'reg';
        doneCard.hidden = which !== 'done';
        var tr = document.getElementById('toRegister'); if (tr) tr.hidden = which !== 'login';
        if (titleEl) {
          if (which === 'login') {
            titleEl.textContent = 'LOGIN';
            titleEl.setAttribute('data-i18n', 'login.title');
            titleEl.classList.remove('reg-mode');
          } else {
            titleEl.textContent = 'Heritage Membership';
            titleEl.removeAttribute('data-i18n');   // don't let the i18n pass reset it
            titleEl.classList.add('reg-mode');
          }
        }
        try { window.scrollTo(0, 0); } catch (e) {}
      }
      function tier() { return comm === 'yes' ? 'commissioner' : (own === 'yes' ? 'custodian' : 'admirer'); }
      function syncTier() {
        var t = tier();
        var el = document.getElementById('rTier');
        if (el) el.textContent = H('reg.joinAs', { art: H(t === 'admirer' ? 'reg.an' : 'reg.a'), tier: H('tier.' + t), extra: H(t === 'admirer' ? 'reg.instant' : 'reg.reviewed') });
        var vin = document.getElementById('rVinBlock'); if (vin) vin.hidden = (t === 'admirer');
      }
      function seg(id, set) {
        var box = document.getElementById(id); if (!box) return;
        [].forEach.call(box.querySelectorAll('button'), function (b) {
          b.addEventListener('click', function () {
            [].forEach.call(box.querySelectorAll('button'), function (x) { x.classList.remove('on'); });
            b.classList.add('on'); set(b.getAttribute('data-v')); syncTier();
          });
        });
      }
      seg('qOwn', function (v) { own = v; });
      seg('qComm', function (v) { comm = v; });
      localizeReg(); syncTier();
      window.addEventListener('minervalang', function () { localizeReg(); syncTier(); });

      var tReg = document.getElementById('toRegister'); if (tReg) tReg.addEventListener('click', function () { show('reg'); });
      var tLog = document.getElementById('toLogin'); if (tLog) tLog.addEventListener('click', function () { show('login'); });
      var dn = document.getElementById('regDoneBtn'); if (dn) dn.addEventListener('click', function () { show('login'); });

      var btn = document.getElementById('registerBtn');
      function register() {
        var err = document.getElementById('registerError'); err.textContent = '';
        var name = (document.getElementById('rName').value || '').trim();
        var email = (document.getElementById('rEmail').value || '').trim();
        var pw = document.getElementById('rPw').value || '';
        var vin = (document.getElementById('rVin').value || '').trim();
        var t = tier();
        if (!name) { err.textContent = H('reg.errName'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = H('reg.errEmail'); return; }
        if (pw.length < 8) { err.textContent = H('reg.errPw'); return; }
        if (t !== 'admirer' && !vin) { err.textContent = H('reg.errVin'); return; }
        var CFG = window.MINERVA_SUPABASE || {};
        if (!CFG.url || !CFG.anonKey) { err.textContent = 'Service unavailable — please try again in a moment'; return; }
        if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
        fetch(CFG.url + '/functions/v1/heritage-register', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'apikey': CFG.anonKey, 'authorization': 'Bearer ' + CFG.anonKey },
          body: JSON.stringify({ name: name, email: email, password: pw, ownsMinerva: own === 'yes', hasCommission: comm === 'yes', vin: vin || null, lang: curLang() })
        }).then(function (r) { return r.json().catch(function () { return {}; }).then(function (b) { return { ok: r.ok, b: b }; }); })
          .then(function (res) {
            if (btn) { btn.disabled = false; btn.textContent = H('reg.submit'); }
            if (!res.ok || (res.b && res.b.error)) {
              var e = res.b && res.b.error;
              err.textContent = e === 'email-taken' ? H('reg.errExists')
                : e === 'vin-required' ? H('reg.errVin')
                : e === 'password-weak' ? H('reg.errPw')
                : 'We could not complete your application. Please try again.';
              return;
            }
            var active = res.b && res.b.status === 'active';
            document.getElementById('regDoneH').textContent = active ? H('reg.okTitle') : H('reg.pendTitle');
            document.getElementById('regDoneB').textContent = active ? H('reg.okBody') : H('reg.pendBody', { name: name, tier: H('tier.' + t) });
            show('done');
          }).catch(function () {
            if (btn) { btn.disabled = false; btn.textContent = H('reg.submit'); }
            err.textContent = 'We could not complete your application. Please try again.';
          });
      }
      if (btn) btn.addEventListener('click', register);

      // show/hide password toggles (login + registration)
      [].forEach.call(document.querySelectorAll('.pw-eye'), function (eye) {
        eye.addEventListener('click', function () {
          var inp = document.getElementById(eye.getAttribute('data-eye'));
          if (!inp) return;
          var reveal = inp.type === 'password';
          inp.type = reveal ? 'text' : 'password';
          eye.classList.toggle('on', reveal);
          eye.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
        });
      });
    })();
  </script>
</body>
