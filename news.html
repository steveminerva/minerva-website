  <script>
    // Public newsroom: render only Published items tagged for the public website
    // (webPublic === true). Falls back to the “coming soon” line when empty.
    (function () {
      function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
      function fmt(d){ try { return new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' }); } catch(e){ return d || ''; } }
      function render(items){
        var feed = document.getElementById('newsFeed'), empty = document.getElementById('newsEmpty'), body = document.querySelector('.news-page .page-body');
        var pub = (items || []).filter(function(n){ return n && n.status === 'Published' && n.webPublic === true; })
          .sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });
        if (!pub.length) { return; }
        feed.innerHTML = pub.map(function(n){
          return '<article class="news-art"><div class="na-date">' + esc(fmt(n.date)) + '</div>'
            + '<div class="na-main"><h2 class="na-title">' + esc(n.title) + '</h2>'
            + (n.body ? '<p class="na-body">' + esc(n.body) + '</p>' : '') + '</div></article>';
        }).join('');
        feed.hidden = false;
        if (empty) empty.hidden = true;
        if (body) body.hidden = true;
      }
      function attempt(tries){
        var V = window.MinervaVIP;
        if (V && typeof V.getNews === 'function') {
          try { var r = V.getNews(); if (r && typeof r.then === 'function') { r.then(render); } else { render(r); } } catch(e){}
          return;
        }
        if (tries > 0) setTimeout(function(){ attempt(tries - 1); }, 120);
      }
      attempt(40);
    })();
  </script>
