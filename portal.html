<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Portal — Minerva Luxury Motors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/minerva.css">
<style>
  .pt-wrap { max-width: 980px; margin: 0 auto; padding: 5vh 0 6vh; }
  .pt-center { text-align: center; max-width: 760px; margin: 0 auto; }
  .pt-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--platinum-deep); }
  .pt-title { font-size: clamp(1.7rem,5vw,3rem); letter-spacing: .03em; margin: 12px 0 14px; }
  .pt-body { font-weight: 300; color: var(--fg-dim); line-height: 1.7; max-width: 48ch; margin: 0 auto 22px; }
  .pt-tier { display:inline-block; font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--platinum-bright); border:1px solid rgba(184,188,194,.45); padding:6px 12px; }
  .pt-steps { display:flex; justify-content:center; margin:28px auto; max-width:520px; }
  .pt-step { flex:1; position:relative; font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute); padding-top:22px; }
  .pt-step::before { content:''; position:absolute; top:5px; left:50%; transform:translateX(-50%); width:11px; height:11px; border-radius:50%; background:#0a0b0d; border:1px solid var(--line); }
  .pt-step.on { color:var(--fg-dim); } .pt-step.on::before { background:var(--platinum-bright); border-color:var(--platinum-bright); }
  .pt-loading { text-align:center; padding:16vh 0; color:var(--mute); font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; }
  .pt-head { display:flex; justify-content:space-between; align-items:baseline; gap:14px; flex-wrap:wrap; border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:18px; }
  .pt-hi h1 { font-size:clamp(1.5rem,4vw,2.3rem); letter-spacing:.03em; margin:0; }
  .pt-hi p { color:var(--fg-dim); font-size:13px; margin:6px 0 0; }
  .pt-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
  .pt-tab { font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--fg-dim); background:#0a0b0d; border:1px solid var(--line); padding:10px 16px; cursor:pointer; }
  .pt-tab.on { border-color:var(--platinum-deep); color:var(--fg); background:#0d0e11; }
  .pt-intro { color:var(--mute); font-size:13px; line-height:1.6; margin:0 0 16px; max-width:62ch; }
  .pt-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .pt-card { border:1px solid var(--line); background:linear-gradient(180deg,#070809,#050506); padding:16px; }
  .pt-card h3 { margin:0 0 4px; font-size:15px; font-weight:500; }
  .pt-card .meta { font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--platinum-deep); }
  .pt-card .desc { color:var(--fg-dim); font-size:13px; line-height:1.55; margin:8px 0 0; }
  .pt-badge { display:inline-block; font-family:var(--mono); font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; padding:2px 7px; border:1px solid var(--line); color:var(--fg-dim); margin-left:6px; }
  .pt-badge.pub { color:#3fb27f; border-color:#3fb27f55; } .pt-badge.inv { color:#c2a15a; border-color:#c2a15a55; }
  .pt-cat { border-top:1px solid var(--line); }
  .pt-catrow { display:flex; justify-content:space-between; gap:10px; padding:11px 2px; border-bottom:1px solid var(--line); font-size:13px; }
  .pt-catrow .yr { font-family:var(--mono); color:var(--platinum-deep); font-size:11px; }
  .pt-empty { color:var(--mute); font-style:italic; padding:24px 0; }
  .pt-sec-h { font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--platinum-deep); margin:6px 0 8px; }
  /* The portal is a working surface, not a centered hero. Override .page's
     vertical/horizontal centering so the dashboard top-aligns, fills the width
     and reads left — and never gets clipped at the top when content is tall. */
  .page { justify-content:flex-start; align-items:stretch; text-align:left; padding-top:clamp(84px,11vh,120px); }
  .pt-wrap { width:100%; }
  .pt-center { text-align:center; }   /* keep the pending-review wall centered */
  @media (max-width: 600px) {
    .page { padding-left:18px; padding-right:18px; }
    .pt-tab { flex:1 1 auto; text-align:center; }
    .pt-grid { grid-template-columns:1fr; }
    .pt-title { font-size:clamp(1.45rem,7vw,2rem); }
    .pt-head { gap:8px; }
  }
</style>
</head>
<body class="inner">
  <header class="top"><a class="brand-mini" href="index.html">MINERVA</a></header>
  <main class="page" data-screen-label="Portal">
    <div id="ptLoading" class="pt-loading">Loading…</div>
    <div id="ptContent" hidden></div>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/heritage-i18n.js"></script>
  <script src="assets/minerva.js"></script>
  <script>
  /* Secure, localized Heritage portal. Role is resolved by the engine (vip.js)
     from the Supabase session; member data is read with the member's own session
     so RLS limits it; all labels come from the member's language (heritage-i18n). */
  (function () {
    var H = (window.MinervaHeritageL10n)
      ? function (k, vars) { return window.MinervaHeritageL10n.t(k, window.MinervaHeritageL10n.pickLang(), vars); }
      : function (k, vars) { return k; };
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
    function ready(fn) { if (window.MinervaVIP) { (window.MinervaVIP.ready ? window.MinervaVIP.ready(fn) : fn()); return; } var t = setInterval(function () { if (window.MinervaVIP) { clearInterval(t); ready(fn); } }, 40); }

    ready(function () {
      var V = window.MinervaVIP;
      var loading = document.getElementById('ptLoading');
      var content = document.getElementById('ptContent');
      function showEl() { loading.hidden = true; content.hidden = false; }

      if (!V.isAdmin() && !(V.isHeritage && V.isHeritage()) && !V.currentVip()) { location.replace('login.html'); return; }
      if (V.isAdmin()) { location.replace('admin.html'); return; }
      if (!(V.isHeritage && V.isHeritage())) { location.replace('index.html'); return; }

      var tier = (V.memberTier && V.memberTier()) || 'admirer';
      var tierTxt = H('tier.' + tier);
      var acc = V.account ? V.account() : {};
      content.className = 'pt-wrap';

      /* ---- pending applicants: the localized under-review wall ---- */
      if (V.memberPending && V.memberPending()) {
        var body = H('review.body', { name: (acc && acc.name) ? (' ' + acc.name) : '', tier: tierTxt, vin: '' });
        content.innerHTML =
          '<div class="pt-center"><p class="pt-eyebrow">' + esc(H('review.eyebrow')) + '</p>'
          + '<h1 class="pt-title">' + esc(H('review.title')) + '</h1>'
          + '<span class="pt-tier">' + esc(tierTxt) + '</span>'
          + '<p class="pt-body" style="margin-top:18px;">' + esc(body) + '</p>'
          + '<div class="pt-steps"><div class="pt-step on">' + esc(H('review.step1')) + '</div><div class="pt-step on">' + esc(H('review.step2')) + '</div><div class="pt-step">' + esc(H('review.step3')) + '</div></div>'
          + '<a class="back-link" href="index.html"><span class="arr">←</span> MINERVA</a></div>';
        showEl();
        return;
      }

      /* ---- active members: the portal ---- */
      var CFG = window.MINERVA_SUPABASE || {};
      var pdb = window.supabase.createClient(CFG.url, CFG.anonKey, { auth: { persistSession: true, autoRefreshToken: false, detectSessionInUrl: false } });
      var tab = 'archive';

      function shell(inner) {
        content.innerHTML =
          '<div class="pt-head"><div class="pt-hi"><h1>' + esc((acc && acc.name) || 'Member') + '</h1>'
          + '<p>' + esc(tierTxt) + (acc && acc.endDate ? ' · ' + esc(H('card.standing')) : '') + '</p></div>'
          + '<a class="back-link" href="index.html"><span class="arr">←</span> MINERVA</a></div>'
          + '<div class="pt-tabs">'
          +   '<button class="pt-tab' + (tab === 'archive' ? ' on' : '') + '" data-tab="archive">' + esc(H('common.heritage')) + '</button>'
          +   '<button class="pt-tab' + (tab === 'vehicles' ? ' on' : '') + '" data-tab="vehicles">' + esc(H('common.vehicles')) + '</button>'
          +   '<button class="pt-tab' + (tab === 'news' ? ' on' : '') + '" data-tab="news">' + esc(H('common.news')) + '</button>'
          + '</div><div id="ptTab">' + inner + '</div>';
        [].forEach.call(content.querySelectorAll('[data-tab]'), function (b) {
          b.addEventListener('click', function () { tab = b.getAttribute('data-tab'); route(); });
        });
        showEl();
      }
      function setTab(html) { var el = document.getElementById('ptTab'); if (el) el.innerHTML = html; }
      function route() { shell('<p class="pt-empty">…</p>'); if (tab === 'archive') loadArchive(); else if (tab === 'vehicles') loadVehicles(); else loadNews(); }

      function loadArchive() {
        pdb.from('archives').select('*').order('created_at', { ascending: false }).then(function (res) {
          var rows = (res && res.data) || [];
          var head = '<p class="pt-intro">' + esc(H('portal.heritageIntro')) + '</p>';
          if (!rows.length) { setTab(head + '<p class="pt-empty">' + esc(H('portal.noDocs')) + '</p>'); return; }
          setTab(head + '<div class="pt-grid">' + rows.map(function (a) {
            return '<div class="pt-card"><h3>' + esc(a.title || '—') + (a.visibility === 'public' ? '<span class="pt-badge pub">' + esc(H('common.public')) + '</span>' : '') + '</h3>'
              + '<span class="meta">' + esc(a.category || '') + (a.year ? ' · ' + esc(a.year) : '') + '</span>'
              + (a.description ? '<p class="desc">' + esc(a.description) + '</p>' : '') + '</div>';
          }).join('') + '</div>');
        }).catch(function () { setTab('<p class="pt-empty">…</p>'); });
      }

      function loadVehicles() {
        Promise.all([pdb.from('vehicles').select('*'), pdb.from('vehicle_models').select('*').order('launch', { ascending: false })]).then(function (r) {
          var mine = (r[0] && r[0].data) || [], models = (r[1] && r[1].data) || [];
          var html = '<p class="pt-sec-h">' + esc(H('portal.yourMinerva')) + '</p>';
          html += mine.length
            ? '<div class="pt-grid">' + mine.map(function (v) { return '<div class="pt-card"><h3>' + esc(v.model || '—') + '</h3><span class="meta">VIN ' + esc(v.vin || '—') + (v.model_date ? ' · ' + esc(v.model_date) : '') + '</span></div>'; }).join('') + '</div>'
            : '<p class="pt-empty">' + esc(H('portal.noVehicle')) + '</p>';
          html += '<p class="pt-sec-h" style="margin-top:26px;">' + esc(H('portal.modelCatalogue')) + '</p><p class="pt-intro">' + esc(H('portal.catalogueIntro')) + '</p>';
          html += '<div class="pt-cat">' + (models.length ? models.map(function (m) {
            return '<div class="pt-catrow"><span>' + esc(m.name || '') + (m.type || m.line ? ' · ' + esc(m.type || m.line) : '') + '</span><span class="yr">' + esc(m.launch || '') + ' · ' + esc(m.status || '') + '</span></div>';
          }).join('') : '<p class="pt-empty">—</p>') + '</div>';
          setTab(html);
        }).catch(function () { setTab('<p class="pt-empty">…</p>'); });
      }

      function loadNews() {
        pdb.from('news').select('*').eq('status', 'published').order('date', { ascending: false }).then(function (res) {
          var rows = (res && res.data) || [];
          if (!rows.length) { setTab('<p class="pt-empty">' + esc(H('portal.noNews')) + '</p>'); return; }
          setTab(rows.map(function (n) {
            var inv = n.audience && n.audience !== 'all';
            return '<div class="pt-card" style="margin-bottom:12px;"><h3>' + esc(n.title || '—') + (inv ? '<span class="pt-badge inv">' + esc(H('common.invitation')) + '</span>' : '') + '</h3>'
              + '<span class="meta">' + esc(n.date || '') + '</span>'
              + (n.body ? '<p class="desc">' + esc(n.body) + '</p>' : '') + '</div>';
          }).join(''));
        }).catch(function () { setTab('<p class="pt-empty">…</p>'); });
      }

      route();
    });
  })();
  </script>
</body>
</html>
