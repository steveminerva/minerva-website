<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="shortcut icon" href="assets/favicon-32.png">
<title>My Account — Minerva Luxury Motors</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/minerva.css">
<style>
  .acc-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 80;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: clamp(16px,3vw,26px) var(--pad);
    border-bottom: 1px solid var(--line); background: rgba(5,5,6,0.86); backdrop-filter: blur(8px);
  }
  .acc-brand { display: flex; align-items: baseline; gap: 14px; }
  .acc-brand .wm { font-weight: 500; font-size: 15px; letter-spacing: 0.42em; text-indent: 0.42em; color: var(--fg); transition: color 0.35s var(--ease); }
  .acc-brand a.wm:hover { color: var(--platinum-bright); }
  .acc-brand .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--platinum-deep); }
  .acc-back { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); transition: color 0.35s var(--ease); }
  .acc-back:hover { color: var(--platinum-bright); }

  .acc-wrap { max-width: 560px; margin: 0 auto; padding: clamp(120px,16vh,170px) var(--pad) clamp(70px,10vh,120px); }
  .acc-eyebrow { font-family: var(--mono); font-size: clamp(10px,1vw,12px); letter-spacing: 0.34em; text-transform: uppercase; color: var(--platinum-deep); }
  .acc-h1 { font-weight: 300; font-size: clamp(2rem,6vw,3.2rem); letter-spacing: 0.05em; line-height: 1.05; margin-top: 14px; }

  .acc-profile { display: flex; align-items: center; gap: 18px; margin-top: clamp(26px,4vh,40px); padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .acc-avatar { width: 64px; height: 64px; border-radius: 50%; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 26px; color: var(--platinum-bright); flex: none; }
  .acc-id .nm { font-weight: 400; font-size: 1.25rem; color: var(--fg); }
  .acc-id .em { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--fg-dim); margin-top: 6px; }
  .acc-id .role { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--platinum-bright); border: 1px solid rgba(184,188,194,0.45); padding: 4px 8px; margin-top: 8px; display: inline-block; }

  .acc-meta { display: flex; flex-wrap: wrap; gap: 10px 26px; margin-top: 22px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--fg-dim); }
  .acc-meta b { color: var(--platinum); font-weight: 500; }

  .acc-section-h { display: flex; align-items: center; gap: 16px; margin: clamp(34px,5vh,48px) 0 20px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--platinum-deep); }
  .acc-section-h::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .ff { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .ff > label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--platinum-deep); }
  .ff-input { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); background: #0a0b0d; padding: 0 14px; transition: border-color 0.3s var(--ease), background 0.3s var(--ease); }
  .ff-input:focus-within { border-color: var(--platinum-deep); background: #0d0e11; }
  .ff-input input { flex: 1; background: transparent; border: 0; outline: none; color: var(--fg); font-family: var(--sans); font-size: 15px; letter-spacing: 0.01em; padding: 14px 0; }
  .ff-input input::placeholder { color: var(--mute); }
  .ff-eye { background: none; border: 0; cursor: pointer; color: var(--mute); display: flex; padding: 4px; transition: color 0.3s var(--ease); }
  .ff-eye:hover { color: var(--platinum-bright); }
  .ff-eye svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.5; fill: none; }

  /* password rules checklist */
  .pw-rules { display: flex; flex-direction: column; gap: 8px; margin: -6px 0 20px; }
  .pw-rule { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.05em; color: var(--mute); transition: color 0.3s var(--ease); }
  .pw-rule .tick { width: 15px; height: 15px; border: 1px solid var(--line); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex: none; }
  .pw-rule .tick svg { width: 9px; height: 9px; stroke: #000; stroke-width: 2.4; fill: none; opacity: 0; }
  .pw-rule.ok { color: var(--platinum-bright); }
  .pw-rule.ok .tick { background: var(--platinum-bright); border-color: var(--platinum-bright); }
  .pw-rule.ok .tick svg { opacity: 1; }

  .acc-msg { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; min-height: 14px; margin-top: 4px; }
  .acc-msg.err { color: var(--minerva-red-bright); }
  .acc-msg.ok { color: var(--platinum-bright); }
  .btn-block { width: 100%; }
  .btn-block:disabled { opacity: 0.4; cursor: not-allowed; }
  .acc-note { font-weight: 300; font-size: 0.96rem; line-height: 1.6; color: var(--fg-dim); text-wrap: pretty; }
</style>
</head>
<body class="inner">

  <header class="acc-top">
    <div class="acc-brand"><a class="wm" href="index.html">MINERVA</a><span class="lbl">My Account</span></div>
    <a class="acc-back" href="index.html">← Back to site</a>
  </header>

  <main class="acc-wrap" id="accRoot" data-screen-label="My Account"></main>

  <script src="assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/minerva.js"></script>
  <script src="assets/vip.js"></script>
  <script>
  (function () {
    'use strict';
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (m) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[m]; }); }
    var EYE = '<svg viewBox="0 0 24 24"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    var EYEOFF = '<svg viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M10.6 5.2A10.8 10.8 0 0 1 12 5c6.4 0 10 7 10 7a17.6 17.6 0 0 1-3.4 4.1M6.2 6.2A17.6 17.6 0 0 0 2 12s3.6 7 10 7a10.6 10.6 0 0 0 4.3-.9"/><path d="M9.5 10.6a3 3 0 0 0 4 4"/></svg>';
    var SUPER_EMAIL = 'admin@minervaluxurymotors.com';
    function fmtDate(ds) { if (!ds) return ''; try { var d = new Date(String(ds).length <= 10 ? ds + 'T00:00:00' : ds); return isNaN(d) ? ds : d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }); } catch (e) { return ds; } }
    function pwChecks(pw) { pw = pw || ''; return [ { id: 'len', label: 'At least 8 characters', ok: pw.length >= 8 }, { id: 'letter', label: 'Contains a letter', ok: /[A-Za-z]/.test(pw) }, { id: 'number', label: 'Contains a number', ok: /[0-9]/.test(pw) } ]; }
    function pwValid(pw) { return pwChecks(pw).every(function (c) { return c.ok; }); }

    var root = document.getElementById('accRoot');

    function renderAnon() {
      root.innerHTML = '<p class="acc-eyebrow">My Account</p><h1 class="acc-h1">Not signed in</h1>'
        + '<p class="acc-note" style="margin-top:18px;">Please sign in to manage your account.</p>'
        + '<a class="btn" style="margin-top:28px;display:inline-block;" href="login.html">Sign in</a>';
    }

    function start() {
      var CFG = window.MINERVA_SUPABASE || {};
      if (!window.supabase || !CFG.url || !CFG.anonKey) {
        root.innerHTML = '<p class="acc-eyebrow">My Account</p><h1 class="acc-h1">Unavailable</h1>'
          + '<p class="acc-note" style="margin-top:18px;">Service unavailable — please try again in a moment.</p>';
        return;
      }
      // Own client; shares the persisted session set by vip.js. autoRefresh off to avoid dueling refreshers.
      var sb = window.supabase.createClient(CFG.url, CFG.anonKey, { auth: { persistSession: true, autoRefreshToken: false, detectSessionInUrl: false } });
      sb.auth.getUser().then(function (r) {
        var user = r && r.data && r.data.user;
        if (!user) { renderAnon(); return; }
        sb.from('profiles').select('name,is_admin,tier,status,end_date,membership_end,member_lang').eq('id', user.id).single()
          .then(function (pr) {
            var p = (pr && pr.data) || {};
            var email = user.email || '';
            var isAdmin = !!p.is_admin;
            var sup = isAdmin && String(email).toLowerCase() === SUPER_EMAIL;
            var role = isAdmin ? 'admin' : (p.tier ? 'heritage' : 'vip');
            var acct = { id: user.id, email: email, name: p.name || email, role: role, super: sup,
                         tier: p.tier || null, endDate: p.tier ? (p.membership_end || null) : (p.end_date || null) };
            renderAccount(sb, acct);
          }).catch(function () { renderAnon(); });
      }).catch(function () { renderAnon(); });
    }

    function renderAccount(sb, acct) {
      var initials = (acct.name || 'M').split(/\s+/).map(function (w) { return w[0]; }).slice(0, 2).join('').toUpperCase();
      var roleLabel = acct.super ? 'Super-admin' : (acct.role === 'admin' ? 'Admin' : (acct.role === 'heritage' ? ('Heritage' + (acct.tier ? ' · ' + acct.tier.charAt(0).toUpperCase() + acct.tier.slice(1) : '')) : 'VIP'));
      var validLine = (acct.role === 'admin') ? 'No expiry' : (acct.endDate ? fmtDate(acct.endDate) : 'No end date');

      var pwSection;
      if (acct.super) {
        pwSection = '<p class="acc-section-h">Password</p>'
          + '<p class="acc-note">The master super-admin password is fixed in the system configuration and cannot be changed from this page. To rotate it, update it in the deployment settings (see the backend handoff).</p>';
      } else {
        pwSection = '<p class="acc-section-h">Change password</p>'
          + '<form id="pwForm" autocomplete="off" onsubmit="return false;">'
          +   '<div class="ff"><label for="curPw">Current password</label>'
          +     '<div class="ff-input"><input id="curPw" type="password" placeholder="Enter your current password" autocomplete="current-password">'
          +       '<button class="ff-eye" type="button" data-eye="curPw" aria-label="Show password">' + EYE + '</button></div></div>'
          +   '<div class="ff"><label for="newPw">New password</label>'
          +     '<div class="ff-input"><input id="newPw" type="password" placeholder="Choose a new password" autocomplete="new-password" disabled>'
          +       '<button class="ff-eye" type="button" data-eye="newPw" aria-label="Show password">' + EYE + '</button></div></div>'
          +   '<div class="pw-rules" id="pwRules"></div>'
          +   '<div class="ff"><label for="newPw2">Confirm new password</label>'
          +     '<div class="ff-input"><input id="newPw2" type="password" placeholder="Repeat the new password" autocomplete="new-password" disabled>'
          +       '<button class="ff-eye" type="button" data-eye="newPw2" aria-label="Show password">' + EYE + '</button></div></div>'
          +   '<p class="acc-msg" id="pwMsg"></p>'
          +   '<button class="btn btn-block" type="submit" id="pwBtn" disabled>Set new password</button>'
          + '</form>';
      }

      root.innerHTML = ''
        + '<p class="acc-eyebrow">My Account</p>'
        + '<h1 class="acc-h1">' + esc(acct.name) + '</h1>'
        + '<div class="acc-profile">'
        +   '<div class="acc-avatar">' + esc(initials) + '</div>'
        +   '<div class="acc-id"><div class="nm">' + esc(acct.name) + '</div><div class="em">' + esc(acct.email) + '</div>'
        +     '<span class="role">' + esc(roleLabel) + '</span></div>'
        + '</div>'
        + '<div class="acc-meta">'
        +   '<span>Role <b>' + esc(roleLabel) + '</b></span>'
        +   '<span>Access valid until <b>' + esc(validLine) + '</b></span>'
        + '</div>'
        + pwSection;

      [].forEach.call(root.querySelectorAll('[data-eye]'), function (btn) {
        btn.addEventListener('click', function () {
          var inp = document.getElementById(btn.getAttribute('data-eye'));
          if (!inp) return;
          var show = inp.type === 'password';
          inp.type = show ? 'text' : 'password';
          btn.innerHTML = show ? EYEOFF : EYE;
        });
      });

      if (acct.super) return;

      var rulesEl = document.getElementById('pwRules');
      rulesEl.innerHTML = pwChecks('').map(function (r) {
        return '<div class="pw-rule" data-rule="' + r.id + '"><span class="tick"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span>' + esc(r.label) + '</div>';
      }).join('');

      var curPw = document.getElementById('curPw');
      var newPw = document.getElementById('newPw');
      var newPw2 = document.getElementById('newPw2');
      var msg = document.getElementById('pwMsg');
      var btn = document.getElementById('pwBtn');

      function gateOnCurrent() { var has = curPw.value.trim().length > 0; newPw.disabled = !has; newPw2.disabled = !has; }
      function refresh() {
        pwChecks(newPw.value).forEach(function (c) { var el = rulesEl.querySelector('[data-rule="' + c.id + '"]'); if (el) el.classList.toggle('ok', c.ok); });
        var match = newPw.value && newPw.value === newPw2.value;
        btn.disabled = !(curPw.value.trim() && pwValid(newPw.value) && match);
        msg.className = 'acc-msg';
        if (newPw2.value && !match) { msg.className = 'acc-msg err'; msg.textContent = 'Passwords do not match'; }
        else { msg.textContent = ''; }
      }
      curPw.addEventListener('input', function () { gateOnCurrent(); refresh(); });
      newPw.addEventListener('input', refresh);
      newPw2.addEventListener('input', refresh);

      document.getElementById('pwForm').addEventListener('submit', function () {
        var cur = curPw.value, np = newPw.value;
        if (!pwValid(np)) { msg.className = 'acc-msg err'; msg.textContent = 'New password does not meet the requirements'; return; }
        if (np !== newPw2.value) { msg.className = 'acc-msg err'; msg.textContent = 'Passwords do not match'; return; }
        btn.disabled = true; msg.className = 'acc-msg'; msg.textContent = 'Updating…';
        // Verify the current password by re-authenticating, then update via Supabase Auth.
        sb.auth.signInWithPassword({ email: acct.email, password: cur }).then(function (res) {
          if (res.error) { msg.className = 'acc-msg err'; msg.textContent = 'Current password is incorrect'; return; }
          return sb.auth.updateUser({ password: np }).then(function (up) {
            if (up.error) { msg.className = 'acc-msg err'; msg.textContent = 'Could not update password — please try again'; return; }
            msg.className = 'acc-msg ok'; msg.textContent = 'Password updated';
            curPw.value = ''; newPw.value = ''; newPw2.value = ''; gateOnCurrent(); refresh(); btn.disabled = true;
          });
        }).catch(function () { msg.className = 'acc-msg err'; msg.textContent = 'Could not update password — please try again'; });
      });
    }

    if (document.readyState !== 'loading') start(); else document.addEventListener('DOMContentLoaded', start);
  })();
  </script>
</body>
</html>
