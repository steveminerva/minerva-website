<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Minerva Luxury Motors</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/minerva.css">
<style>
  .adm-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 80;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: clamp(16px,3vw,26px) var(--pad);
    border-bottom: 1px solid var(--line); background: rgba(5,5,6,0.86);
    backdrop-filter: blur(8px);
  }
  .adm-top[hidden] { display: none; }
  .adm-brand { display: flex; align-items: baseline; gap: 14px; }
  .adm-brand .wm { font-weight: 500; font-size: 15px; letter-spacing: 0.42em; text-indent: 0.42em; color: var(--fg); transition: color 0.35s var(--ease); }
  .adm-brand a.wm:hover { color: var(--platinum-bright); }
  .adm-brand .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--platinum-deep); }
  .adm-signout { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); background: none; border: 0; cursor: pointer; transition: color 0.35s var(--ease); }
  .adm-signout:hover { color: var(--platinum-bright); }

  .adm-wrap { max-width: 920px; margin: 0 auto; padding: clamp(120px,16vh,170px) var(--pad) clamp(70px,10vh,120px); }
  .adm-eyebrow { font-family: var(--mono); font-size: clamp(10px,1vw,12px); letter-spacing: 0.34em; text-transform: uppercase; color: var(--platinum-deep); }
  .adm-h1 { font-weight: 300; font-size: clamp(2rem,6vw,3.6rem); letter-spacing: 0.06em; line-height: 1.04; margin-top: 14px; }
  .adm-crumb { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; font-family: var(--mono); font-size: clamp(11px,1.4vw,13px); letter-spacing: 0.16em; text-transform: uppercase; }
  .adm-crumb .cr-root { color: var(--platinum-deep); transition: color 0.3s var(--ease); }
  .adm-crumb .cr-root:hover { color: var(--platinum-bright); }
  .adm-crumb .cr-sep { color: var(--mute); }
  .adm-crumb .cr-here { color: var(--fg); }
  .adm-sub { margin-top: 16px; font-weight: 300; font-size: clamp(0.95rem,1.6vw,1.1rem); line-height: 1.6; color: var(--fg-dim); max-width: 58ch; text-wrap: pretty; }

  /* menu cards */
  .adm-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: clamp(16px,2.4vw,24px); margin-top: clamp(34px,5vh,52px); }
  .adm-card {
    display: flex; flex-direction: column; gap: 10px; text-align: left;
    border: 1px solid var(--line); padding: clamp(24px,3vw,36px);
    cursor: pointer; background: linear-gradient(180deg,#070809,#050506);
    transition: border-color 0.4s var(--ease), transform 0.5s var(--ease);
  }
  .adm-card:hover { border-color: var(--platinum-deep); transform: translateY(-3px); }
  .adm-card .num { font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; color: var(--platinum-deep); }
  .adm-card .title { font-weight: 400; font-size: clamp(1.2rem,2.4vw,1.6rem); color: var(--fg); letter-spacing: 0.01em; }
  .adm-card .desc { font-weight: 300; font-size: 0.92rem; line-height: 1.55; color: var(--fg-dim); }
  .adm-card .go { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--platinum); margin-top: 6px; }

  /* forms */
  .adm-form { width: min(94vw,460px); display: flex; flex-direction: column; gap: 22px; margin-top: clamp(30px,5vh,46px); text-align: left; }
  .field-hint { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: none; color: var(--mute); margin-top: 6px; line-height: 1.5; }
  .adm-err { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--minerva-red-bright); min-height: 13px; }
  .adm-okmsg { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--platinum-bright); min-height: 13px; }

  /* clearer fields: framed inputs so it's obvious where to type */
  .ff { display: flex; flex-direction: column; gap: 8px; }
  .ff > label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--platinum-deep); }
  .ff-input {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--line); background: #0a0b0d; padding: 0 14px;
    transition: border-color 0.3s var(--ease), background 0.3s var(--ease);
  }
  .ff-input:focus-within { border-color: var(--platinum-deep); background: #0d0e11; }
  .ff-input input {
    flex: 1; background: transparent; border: 0; outline: none; color: var(--fg);
    font-family: var(--sans); font-size: 15px; letter-spacing: 0.01em; padding: 14px 0;
  }
  .ff-input input::placeholder { color: var(--mute); }
  .ff-input input[type="date"] { color-scheme: dark; }
  .ff-input select.ff-select { flex: 1; background: transparent; border: 0; outline: none; color: var(--fg); font-family: var(--sans); font-size: 15px; padding: 14px 0; cursor: pointer; }
  .ff-input select.ff-select option { background: #0b0c0e; color: var(--fg); }
  body.adm-light .ff-input select.ff-select option { background: #fff; color: #1a2230; }
  .ff-eye { background: none; border: 0; cursor: pointer; color: var(--mute); display: flex; padding: 4px; transition: color 0.3s var(--ease); }
  .ff-eye:hover { color: var(--platinum-bright); }
  .ff-eye svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  input[type="date"] { color-scheme: dark; }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 1; cursor: pointer; padding-left: 4px; }
  input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

  /* segmented control (user type) */
  .seg { display: flex; gap: 0; border: 1px solid var(--line); }
  .seg button { flex: 1; background: transparent; border: 0; border-right: 1px solid var(--line); cursor: pointer; padding: 13px 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); transition: background 0.3s var(--ease), color 0.3s var(--ease); }
  .seg button:last-child { border-right: 0; }
  .seg button.on { background: var(--fg); color: #000; }
  .seg button:not(.on):hover { color: var(--fg); background: rgba(184,188,194,0.06); }

  /* friendly date picker */
  .dp-quick { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .dp-chip { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--platinum-deep); background: transparent; border: 1px solid var(--line); padding: 8px 13px; cursor: pointer; transition: color 0.3s var(--ease), border-color 0.3s var(--ease); }
  .dp-chip:hover, .dp-chip.on { color: var(--platinum-bright); border-color: var(--platinum-deep); }
  .dp-readout { margin-top: 12px; font-family: var(--sans); font-weight: 300; font-size: 0.98rem; color: var(--fg); }
  .dp-readout b { color: var(--platinum-bright); font-weight: 500; }
  .dp-readout .rel { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--platinum-deep); text-transform: uppercase; margin-left: 8px; }

  .btn-block { width: 100%; }
  .back-admin { display: inline-flex; align-items: center; gap: 10px; margin-top: clamp(34px,5vh,52px); font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mute); transition: color 0.35s var(--ease), gap 0.4s var(--ease); }
  .back-admin:hover { color: var(--platinum-bright); gap: 16px; }

  /* list head with New user button */
  .adm-listhead { display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
  .btn-new { display: inline-flex; align-items: center; gap: 9px; background: var(--fg); color: #000; border: 1px solid var(--fg); font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; padding: 12px 20px; cursor: pointer; transition: background 0.35s var(--ease), color 0.35s var(--ease); white-space: nowrap; }
  .btn-new:hover { background: transparent; color: var(--fg); }
  .btn-new svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.7; fill: none; }

  /* table */
  .adm-table { width: 100%; margin-top: clamp(26px,4vh,40px); border-top: 1px solid var(--line); }
  .adm-row { display: grid; grid-template-columns: var(--cols); gap: 14px; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--line-soft); }
  .adm-row.head { border-bottom: 1px solid var(--line); }
  .adm-row.head span { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--platinum-deep); }
  .adm-row .c-no { font-family: var(--mono); font-size: 12px; color: var(--platinum-deep); }
  .adm-row .c-name a { color: var(--fg); border-bottom: 1px solid var(--line); padding-bottom: 1px; transition: color 0.35s var(--ease), border-color 0.35s var(--ease); cursor: pointer; }
  .adm-row .c-name a:hover { color: var(--platinum-bright); border-color: var(--platinum); }
  .adm-row .c-email { color: var(--fg-dim); font-size: 0.9rem; word-break: break-word; }
  .adm-row .c-end, .adm-row .c-login { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg-dim); }
  .adm-row .c-end.none { color: var(--mute); }
  .adm-row .c-end.exp { color: var(--minerva-red-bright); }
  .role-chip { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.16em; text-transform: uppercase; padding: 4px 8px; border: 1px solid var(--line); white-space: nowrap; }
  .role-chip.admin { color: var(--platinum-bright); border-color: rgba(184,188,194,0.45); }
  .role-chip.vip { color: var(--platinum-deep); }
  /* impersonation picker */
  .imp-modal { position: fixed; inset: 0; z-index: 120; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .imp-dialog { width: min(94vw,460px); max-height: 80vh; display: flex; flex-direction: column; background: #0b0c0e; border: 1px solid var(--line); }
  .imp-dhead { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--fg); }
  .imp-x { background: none; border: 0; color: var(--fg-dim); font-size: 15px; cursor: pointer; }
  .imp-dsearch { padding: 12px 18px; border-bottom: 1px solid var(--line); }
  .imp-dsearch input { width: 100%; box-sizing: border-box; background: #0a0b0d; border: 1px solid var(--line); color: var(--fg); font-family: var(--sans); font-size: 14px; padding: 10px 12px; }
  .imp-dlist { overflow: auto; flex: 1; }
  .imp-row { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 18px; background: none; border: 0; border-bottom: 1px solid var(--line); color: var(--fg); cursor: pointer; text-align: left; }
  .imp-row:hover { background: #0d0e11; }
  .imp-meta { display: flex; flex-direction: column; gap: 2px; }
  .imp-nm { font-size: 14px; } .imp-em { font-size: 12px; color: var(--fg-dim); }
  .imp-dhint { padding: 14px 18px; margin: 0; font-size: 11px; color: var(--mute); line-height: 1.5; border-top: 1px solid var(--line); }
  /* concierge chat */
  .cc-stream { min-height: 240px; max-height: 50vh; overflow: auto; border: 1px solid var(--line); padding: 18px; display: flex; flex-direction: column; gap: 12px; margin-top: 18px; background: #070809; }
  .cc-msg { max-width: 80%; padding: 12px 14px; font-size: 14px; line-height: 1.55; border: 1px solid var(--line); white-space: pre-wrap; }
  .cc-msg.me { align-self: flex-end; background: #0d0e11; color: var(--fg); }
  .cc-msg.bot { align-self: flex-start; background: #0a0b0d; color: var(--fg-dim); }
  .cc-msg.thinking { color: var(--mute); }
  .cc-sugs { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
  .cc-sug { font-size: 12px; color: var(--fg-dim); background: #0a0b0d; border: 1px solid var(--line); padding: 8px 12px; cursor: pointer; }
  .cc-sug:hover { border-color: var(--platinum-deep); color: var(--fg); }
  .cc-bar { display: flex; gap: 10px; }
  .cc-bar input { flex: 1; background: #0a0b0d; border: 1px solid var(--line); color: var(--fg); font-family: var(--sans); font-size: 14px; padding: 12px 14px; }
  .adm-empty { padding: 40px 0; font-weight: 300; color: var(--fg-dim); font-size: 1rem; }
  @media (max-width: 700px) {
    .adm-row { grid-template-columns: 30px 1fr 1fr !important; }
    .adm-row .c-end, .adm-row .c-login, .adm-row .c-role, .adm-row .c-invite { display: none; }
    .adm-row.head .c-end, .adm-row.head .c-login, .adm-row.head .c-role, .adm-row.head .c-invite { display: none; }
  }

  /* detail */
  .adm-detail-meta { display: flex; flex-wrap: wrap; gap: 10px 26px; margin-top: 18px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--fg-dim); }
  .adm-detail-meta b { color: var(--platinum); font-weight: 500; }
  .adm-status { display: inline-flex; align-items: center; gap: 8px; }
  .adm-status .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--platinum-bright); }
  .adm-status.expired .pip { background: var(--minerva-red-bright); }
  .adm-extreq { margin-top: 22px; border: 1px solid rgba(177,29,42,0.4); border-left-width: 2px; padding: 14px 18px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; line-height: 1.7; color: var(--platinum); background: rgba(177,29,42,0.06); }
  .adm-extreq b { color: var(--minerva-red-bright); }
  .adm-section-h { display: flex; align-items: center; gap: 16px; margin: clamp(34px,5vh,50px) 0 18px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--platinum-deep); }
  .adm-section-h::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .adm-logs { display: flex; flex-direction: column; }
  .adm-log-item { display: flex; align-items: baseline; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line-soft); font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; color: var(--fg-dim); }
  .adm-log-item .i { color: var(--platinum-deep); min-width: 22px; }
  .adm-log-item .ev-label { color: var(--fg); }
  .adm-log-item .ev-date { margin-left: auto; color: var(--platinum-deep); white-space: nowrap; }
  .adm-log-item.ev-cancelled .ev-label, .adm-log-item.ev-error .ev-label { color: var(--minerva-red-bright); }
  .adm-log-item.ev-dot::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--platinum-deep); flex: none; }
  .btn-cancel { background: transparent; color: var(--minerva-red-bright); border: 1px solid rgba(177,29,42,0.5); font-family: var(--mono); font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; padding: 15px 24px; cursor: pointer; transition: background 0.35s var(--ease), color 0.35s var(--ease), border-color 0.35s var(--ease); }
  .btn-cancel:hover { background: var(--minerva-red); color: #fff; border-color: var(--minerva-red); }
  .adm-extend { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; margin-top: 12px; }
  .adm-extend .ff { flex: 1; min-width: 220px; }
  .adm-extend .btn { margin-top: 0; white-space: nowrap; }

  /* launch counters */
  .counters { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px,2.4vw,22px); margin-top: 4px; }
  @media (max-width: 620px) { .counters { grid-template-columns: 1fr; } }
  .counter { border: 1px solid var(--line); background: linear-gradient(180deg,#070809,#050506); padding: clamp(20px,2.6vw,28px); display: flex; flex-direction: column; gap: 14px; }
  .counter .c-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--platinum-deep); }
  .counter .c-num { display: flex; align-items: center; gap: 14px; }
  .counter .c-count { font-weight: 300; font-size: clamp(2.4rem,6vw,3.4rem); line-height: 1; color: var(--fg); font-variant-numeric: tabular-nums; }
  .counter .c-step { display: flex; flex-direction: column; gap: 6px; }
  .counter .c-step button { width: 30px; height: 26px; background: transparent; border: 1px solid var(--line); color: var(--fg-dim); cursor: pointer; font-family: var(--mono); font-size: 14px; line-height: 1; transition: color 0.3s var(--ease), border-color 0.3s var(--ease); }
  .counter .c-step button:hover { color: var(--platinum-bright); border-color: var(--platinum-deep); }
  .counter .c-target { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--line-soft); padding-top: 14px; }
  .counter .c-target .tl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); }
  .counter .c-presale { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--fg-dim); }
  .counter .c-presale b { color: var(--platinum-bright); font-weight: 500; }

  /* credentials result */
  .cred-card { width: min(94vw,520px); margin-top: clamp(30px,5vh,46px); border: 1px solid var(--line); padding: clamp(26px,3.4vw,40px); display: flex; flex-direction: column; gap: 20px; background: linear-gradient(180deg,#070809,#050506); }
  .cred-row { display: flex; flex-direction: column; gap: 5px; }
  .cred-row .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--platinum-deep); }
  .cred-row .v { font-size: 1.05rem; color: var(--fg); word-break: break-word; }
  .cred-row .v.pw { font-family: var(--mono); letter-spacing: 0.08em; color: var(--platinum-bright); font-size: 1.15rem; }
  .cred-deliver { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; line-height: 1.7; color: var(--mute); border-top: 1px solid var(--line-soft); padding-top: 16px; word-break: break-all; }
  .cred-deliver a { color: var(--platinum); }

  /* sandbox overlay reuse */
  .sandbox { position: fixed; inset: 0; z-index: 200; background: #000; display: grid; place-items: center; }

  /* FAQ */
  .adm-faq { margin-top: clamp(50px,8vh,90px); border-top: 1px solid var(--line); padding-top: clamp(30px,5vh,46px); }
  .adm-faq > .adm-section-h { margin-top: 0; }
  .faq-item { border-bottom: 1px solid var(--line-soft); }
  .faq-item summary { list-style: none; cursor: pointer; padding: 15px 0; display: flex; align-items: baseline; gap: 14px; font-weight: 400; font-size: clamp(0.86rem,1.3vw,0.96rem); color: var(--fg); transition: color 0.35s var(--ease); }
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary:hover { color: var(--platinum-bright); }
  .faq-item summary .q-mark { font-family: var(--mono); font-size: 12px; color: var(--platinum-deep); flex: none; }
  .faq-item summary .plus { margin-left: auto; font-family: var(--mono); color: var(--platinum-deep); transition: transform 0.4s var(--ease); }
  .faq-item[open] summary .plus { transform: rotate(45deg); color: var(--platinum); }
  .faq-item .a { padding: 0 0 18px 30px; font-weight: 300; font-size: clamp(0.82rem,1.2vw,0.9rem); line-height: 1.65; color: var(--fg-dim); text-wrap: pretty; max-width: 64ch; }
  /* audit logs */
  .au-filters { display: flex; flex-direction: column; gap: 18px; margin-top: clamp(24px,4vh,38px); padding-bottom: clamp(20px,3vh,28px); border-bottom: 1px solid var(--line); }
  .flt-row2 { display: flex; flex-wrap: wrap; gap: 18px 22px; }
  .flt-group { display: flex; flex-direction: column; gap: 10px; }
  .flt-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mute); }
  .flt-dd { position: relative; }
  .flt-dd-btn { display: flex; align-items: center; justify-content: space-between; gap: 14px; min-width: 190px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-dim); background: #0a0b0d; border: 1px solid var(--line); padding: 13px 15px; cursor: pointer; transition: border-color 0.3s var(--ease), color 0.3s var(--ease); }
  .flt-dd-btn:hover, .flt-dd.open .flt-dd-btn { border-color: var(--platinum-deep); color: var(--fg); }
  .flt-dd-btn .caret { transition: transform 0.3s var(--ease); color: var(--platinum-deep); }
  .flt-dd.open .flt-dd-btn .caret { transform: rotate(180deg); }
  .flt-dd-panel { position: absolute; top: calc(100% + 6px); left: 0; z-index: 30; min-width: 100%; max-height: 290px; overflow-y: auto; background: #0b0c0e; border: 1px solid var(--line); box-shadow: 0 18px 50px rgba(0,0,0,0.6); display: none; padding: 6px; }
  .flt-dd.open .flt-dd-panel { display: block; }

  .adm-search { grid-column: 2; position: static; transform: none; left: auto; top: auto; display: flex; align-items: center; gap: 9px; width: min(380px, 34vw); border: 1px solid var(--line); background: #0a0b0d; padding: 0 13px; transition: border-color .3s var(--ease); }
  .adm-search:focus-within { border-color: var(--platinum-deep); }
  .adm-search svg { width: 15px; height: 15px; stroke: var(--platinum-deep); stroke-width: 1.6; fill: none; flex: none; }
  .adm-search input { flex: 1; background: transparent; border: 0; outline: none; color: var(--fg); font-family: var(--sans); font-size: 13px; padding: 10px 0; }
  .adm-search input::placeholder { color: var(--mute); }
  body.adm-light .adm-search { background: #fff; }
  @media (max-width: 900px) { .adm-search { display: none; } .adm-topbar { display: flex; justify-content: flex-end; } }
  .adm-acct { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 8px; border: 1px solid transparent; transition: border-color .25s var(--ease); outline: none; }
  .adm-iconbtn { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: none; border: 0; cursor: pointer; color: var(--mute); transition: color .3s var(--ease); padding: 0; }
  .adm-iconbtn:hover { color: var(--platinum-bright); }
  .adm-iconbtn svg { width: 19px; height: 19px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  .adm-iconbtn .ic-sun { display: none; }
  body.adm-light .adm-iconbtn .ic-moon { display: none; }
  body.adm-light .adm-iconbtn .ic-sun { display: block; }
  .adm-badge { position: absolute; top: 2px; right: 1px; min-width: 14px; height: 14px; padding: 0 3px; border-radius: 7px; background: var(--minerva-red-bright); color: #fff; font-family: var(--mono); font-size: 8.5px; line-height: 14px; text-align: center; font-weight: 500; box-shadow: 0 0 0 2px var(--ink); }
  .adm-badge[hidden] { display: none; }
  .adm-bellwrap { position: relative; display: inline-flex; }
  .adm-bellmenu { position: absolute; top: calc(100% + 8px); right: 0; width: 280px; background: #0b0c0e; border: 1px solid var(--line); box-shadow: 0 18px 50px rgba(0,0,0,0.6); z-index: 50; }
  .adm-bellmenu[hidden] { display: none; }
  .bell-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .bell-head span { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--platinum-deep); }
  .bell-head button { background: none; border: 0; cursor: pointer; font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mute); transition: color .2s var(--ease); }
  .bell-head button:hover { color: var(--platinum-bright); }
  .bell-list { max-height: 320px; overflow-y: auto; }
  .bell-item { display: flex; gap: 11px; padding: 13px 14px; border-bottom: 1px solid var(--line-soft); }
  .bell-item:last-child { border-bottom: 0; }
  .bell-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--minerva-red-bright); flex: none; margin-top: 5px; }
  .bell-item.read .dot { background: var(--faint); }
  .bell-item .bd { display: flex; flex-direction: column; gap: 3px; }
  .bell-item .bt { font-family: var(--sans); font-size: 12.5px; color: var(--fg); line-height: 1.35; }
  .bell-item.read .bt { color: var(--fg-dim); }
  .bell-item .bm { font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; color: var(--mute); }
  .bell-empty { padding: 26px 14px; text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--mute); }

  /* ---------- light theme ---------- */
  body.adm-light { background: #faf7f0; color: #1a2230;
    --fg: #1a2230; --fg-dim: #4a5566; --mute: #8a93a0; --faint: #ddd3c0;
    --line: rgba(16,36,56,0.16); --line-soft: rgba(16,36,56,0.08);
    --platinum-bright: #2a3445; --platinum: #5a6678; --platinum-deep: #7a8494; --ink: #f4eee2; }
  body.adm-light .adm-side, body.adm-light .adm-topbar { background: #f4eee2; }
  body.adm-light .adm-acctmenu, body.adm-light .adm-bellmenu { background: #fff; }
  body.adm-light .dash-stat, body.adm-light .counter, body.adm-light .adm-card, body.adm-light .cred-card { background: #fff; }
  body.adm-light .ff-input, body.adm-light .veh-search, body.adm-light .flt-dd-btn, body.adm-light .flt-dd-panel, body.adm-light .seg { background: #fff; }
  body.adm-light .geo-map { background: #eef0f2 url("assets/worldmap.svg") center/100% 100% no-repeat; }
  body.adm-light .nav-row.on, body.adm-light .adm-nav a.on, body.adm-light .flt-opt.on, body.adm-light .veh-tab.on, body.adm-light .seg button.on { background: rgba(16,36,56,0.07); }
  body.adm-light .av, body.adm-light .acc-avatar2 { background: #fff; }
  body.adm-light .btn { background: var(--platinum-bright); color: #fff; border-color: var(--platinum-bright); }
  body.adm-light .adm-badge { box-shadow: 0 0 0 2px #f4eee2; }
  body.adm-light .adm-edge { background: #f4eee2; color: var(--platinum-deep); }
  body.adm-light .adm-edge:hover { color: var(--platinum-bright); }
  body.adm-light .adm-side:hover { box-shadow: 0 0 50px rgba(16,36,56,0.18); }
  body.adm-light .adm-nav a, body.adm-light .adm-nav .nav-row { color: var(--fg-dim); }
  body.adm-light .adm-nav a:hover, body.adm-light .adm-nav .nav-row:hover { background: rgba(16,36,56,0.05); color: var(--fg); }
  body.adm-light .adm-table, body.adm-light .dash-pages, body.adm-light .geo-list { border-color: var(--line); }
  .adm-acctwrap { position: relative; }
  .adm-acctwrap:hover .adm-acct, .adm-acct:focus { border-color: var(--line); }
  .acct-caret { width: 13px; height: 13px; stroke: var(--platinum-deep); stroke-width: 1.6; fill: none; transition: transform .25s var(--ease); }
  .adm-acctwrap:hover .acct-caret { transform: rotate(180deg); }
  .adm-acctmenu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 210px; background: #0b0c0e; border: 1px solid var(--line); box-shadow: 0 18px 50px rgba(0,0,0,0.6); padding: 6px; opacity: 0; visibility: hidden; transform: translateY(-6px); transition: opacity .22s var(--ease), transform .22s var(--ease), visibility .22s; z-index: 50; }
  .adm-acctwrap:hover .adm-acctmenu, .adm-acctwrap:focus-within .adm-acctmenu { opacity: 1; visibility: visible; transform: translateY(0); }
  .acct-item { display: flex; align-items: center; gap: 11px; width: 100%; padding: 11px 12px; background: none; border: 0; cursor: pointer; text-align: left; text-decoration: none; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-dim); transition: color .2s var(--ease), background .2s var(--ease); }
  .acct-item svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; flex: none; }
  .acct-item:hover { color: var(--fg); background: rgba(184,188,194,0.06); }
  .acct-item.danger { color: var(--minerva-red-bright); }
  .acct-item.danger:hover { background: rgba(177,29,42,0.08); }
  .adm-acct .av { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px; color: var(--platinum-bright); flex: none; }
  .adm-acct .nm { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; color: var(--fg-dim); }
  /* small, discrete sign-out icon button */
  .adm-signout2 { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: none; border: 0; cursor: pointer; color: var(--mute); transition: color .3s var(--ease); }
  .adm-signout2:hover { color: var(--platinum-bright); }
  .adm-signout2 svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  #admRoot { flex: 1; }
  #admRoot .adm-wrap { margin-left: 0; margin-right: auto; padding-top: clamp(30px,5vh,46px); }
  /* mobile: sidebar slides into a drawer */
  .adm-menu-btn { display: none; }
  @media (max-width: 860px) {
    /* sidebar becomes a slide-in drawer; neutralise the desktop rail state */
    .adm-side { transform: translateX(-100%); transition: transform .4s var(--ease); box-shadow: 0 0 60px rgba(0,0,0,0.6); width: 240px; }
    body.adm-rail .adm-side { width: 240px; }
    body.adm-rail .adm-main2 { margin-left: 0; }
    body.adm-drawer-open .adm-side { transform: translateX(0); }
    .adm-main2 { margin-left: 0; }
    .adm-edge { display: none; }
    /* in the drawer, always show full labels + sub-items regardless of rail */
    body.adm-rail .adm-nav .lb, body.adm-rail .adm-brandbox .wm, body.adm-rail .adm-brandbox .lbl { display: block; }
    body.adm-rail .adm-nav a, body.adm-rail .adm-nav .nav-row { justify-content: flex-start; padding-left: 14px; padding-right: 14px; }
    body.adm-rail .nav-parent .caret { display: block; }
    body.adm-rail .nav-group.open .nav-subs { display: block; }
    .adm-menu-btn { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; background: none; border: 1px solid var(--line); cursor: pointer; color: var(--fg); margin-right: auto; }
    .adm-menu-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.6; fill: none; }
    .adm-scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 55; }
    body.adm-drawer-open .adm-scrim { display: block; }
    .adm-acct .nm { display: none; }
    .adm-topbar { padding: 11px 16px; gap: 10px; }
    .adm-actions { gap: 8px; }
  }

  /* ---- Phase 1: "coming soon" treatments (dashboard tiles + section panels) ---- */
  .ds-num.ds-soon { font-family: var(--mono, monospace); font-size: clamp(13px,1.4vw,15px); letter-spacing: .12em; text-transform: uppercase; color: var(--platinum-deep, #8a8f98); font-weight: 500; }
  .adm-soon { min-height: 52vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; padding: clamp(40px,8vh,90px) var(--pad); }
  .adm-soon-mark { width: 46px; height: 46px; border: 1px solid var(--line); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--platinum-deep, #8a8f98); }
  .adm-soon-mark svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  .adm-soon-title { font-weight: 300; letter-spacing: .14em; text-transform: uppercase; font-size: clamp(1.3rem,3vw,1.9rem); margin: 4px 0 0; }
  .adm-soon-body { font-family: var(--mono, monospace); font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--platinum, #b8bcc2); margin: 0; }
  .adm-soon-sub { max-width: 52ch; font-weight: 300; font-size: clamp(.95rem,1.6vw,1.05rem); line-height: 1.6; color: var(--fg-dim, #9aa0a8); margin: 6px 0 0; text-wrap: pretty; }
</style>

<body class="inner">

  <div class="adm-shell">
    <aside class="adm-side" id="admSide">
      <a class="adm-brandbox" href="index.html">
        <img src="uploads/minerva-logo-black.png" alt="">
        <span class="wm">MINERVA</span>
        <span class="lbl" id="admLbl">Administration</span>
      </a>
      <nav class="adm-nav" id="admNav"></nav>
      <button class="adm-edge" id="admCollapse" type="button" aria-label="Collapse menu" title="Collapse menu"><svg viewBox="0 0 24 24"><path d="M14 7l-5 5 5 5"/></svg></button>
    </aside>
    <div class="adm-scrim" id="admScrim"></div>
    <div class="adm-main2">
      <header class="adm-topbar">
        <form class="adm-search" id="admSearch" onsubmit="return false;">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="admSearchInput" type="search" placeholder="Search users, vehicles, certificates…" autocomplete="off">
        </form>
        <button class="adm-menu-btn" id="admMenuBtn" type="button" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
        <div class="adm-actions">
        <button class="adm-iconbtn" id="admTheme" type="button" aria-label="Toggle light / dark" title="Toggle light / dark">
          <svg class="ic-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
        </button>
        <div class="adm-bellwrap">
          <button class="adm-iconbtn" id="admBell" type="button" aria-label="Notifications" title="Notifications">
            <svg viewBox="0 0 24 24"><path d="M18 16V11a6 6 0 1 0-12 0v5l-1.5 2h15z"/><path d="M10 20.5a2 2 0 0 0 4 0"/></svg>
            <span class="adm-badge" id="admBadge">3</span>
          </button>
          <div class="adm-bellmenu" id="admBellMenu" hidden>
            <div class="bell-head"><span>Notifications</span><button type="button" id="admBellClear">Mark all read</button></div>
            <div class="bell-list" id="admBellList"></div>
          </div>
        </div>
        <div class="adm-acctwrap" id="admAcctWrap">
          <div class="adm-acct" tabindex="0"><span class="av" id="admAv">SA</span><span class="nm" id="admAcctName">admin@minervaluxurymotors.com</span><svg class="acct-caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>
          <div class="adm-acctmenu">
            <a class="acct-item" id="admProfileLink" href="#profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 19a6.5 6.5 0 0 1 13 0"/></svg>Profile</a>
            <a class="acct-item" id="admImpersonate" href="#" hidden><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M15.5 8l2 2 3.5-3.5"/></svg>Impersonate user</a>
            <a class="acct-item" id="admHelpLink" href="#help"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 0 1 4 1.8c0 1.5-2 2-2 3.2"/><circle cx="12" cy="17" r="0.5"/></svg>Help &amp; Support</a>
            <button class="acct-item danger" id="admSignout" type="button"><svg viewBox="0 0 24 24"><path d="M14 7V5a1 1 0 0 0-1-1H6a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-2M9.5 12H20m0 0l-3-3m3 3l-3 3"/></svg>Sign out</button>
          </div>
        </div>
        </div>
      </header>
      <main id="admRoot"></main>
    </div>
  </div>

  <!-- Admin console wiring (secure, Supabase-backed). Strict load order:
         1. config.js          -> public project URL + anon key
         2. supabase-js v2      -> the client library
         3. vip.js              -> the LIVE access engine (auth + VIP store)
         4. admin-bridge.js     -> extends MinervaVIP with the console's extra
                                  methods (real VIP/Admin counts; safe stubs)
         5. admin-app.js        -> the admin SPA
       No password is hard-coded anywhere; the admin authenticates against
       Supabase Auth via vip.js. -->
  <script src="assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/vip.js"></script>
  <script src="assets/admin-bridge.js"></script>
  <script src="assets/admin-app.js"></script>
